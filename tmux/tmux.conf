# ── Prefix ───────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ── 기본 설정 ─────────────────────────────────────────
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc,tmux-256color:Tc"
set -g history-limit 50000
set -g mouse on
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── 기본 셸 (zsh 우선) ────────────────────────────────
if-shell "[ -x /bin/zsh ]" "set-option -g default-shell /bin/zsh" \
                            "if-shell '[ -x /usr/bin/zsh ]' 'set-option -g default-shell /usr/bin/zsh'"

# ── 확장 키 (Shift+Enter, Ctrl+Enter 등 전달) ────────
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ── vi 복사 모드 ──────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi M-Up    send-keys -X scroll-up
bind -T copy-mode-vi M-Down  send-keys -X scroll-down
bind -T copy-mode-vi M-PageUp    send-keys -X halfpage-up
bind -T copy-mode-vi M-PageDown  send-keys -X halfpage-down
bind -T copy-mode-vi PageDown send-keys -X page-down
bind -T copy-mode-vi PageUp   send-keys -X page-up

# ── 클립보드 (OS 자동 감지: pbcopy/wl-copy/xclip/clip.exe) ──
bind -T copy-mode-vi y                 send-keys -X copy-pipe-and-cancel "sh -c 'if command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard -i; elif command -v clip.exe >/dev/null 2>&1; then clip.exe; fi'"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "sh -c 'if command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard -i; elif command -v clip.exe >/dev/null 2>&1; then clip.exe; fi'"

# ── 창 분할 ───────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── pane 이동 (vim 스타일) ────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── 플러그인 ──────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'


# ── Dracula 테마 커스텀 ───────────────────────────────
set -g @plugin 'dracula/tmux'

# 표시할 플러그인 (순서대로 오른쪽 상태바에 배치)
set -g @dracula-plugins "git cpu-usage ram-usage time"

# Powerline 구분자 끄기 (미니멀)
set -g @dracula-show-powerline false

# 왼쪽 아이콘: 세션 이름
set -g @dracula-show-left-icon session
set -g @dracula-left-icon-padding 1

# 시간/날짜 포맷
set -g @dracula-time-format "%m/%d %H:%M"
set -g @dracula-day-month false

# Git
set -g @dracula-git-disable-status false
set -g @dracula-git-show-current-symbol ✓
set -g @dracula-git-show-diff-symbol !
set -g @dracula-git-no-repo-message ""

# CPU / RAM 라벨 간소화
set -g @dracula-cpu-usage-label "CPU"
set -g @dracula-ram-usage-label "RAM"
set -g @dracula-cpu-display-load false

# 불필요한 것 끄기
set -g @dracula-show-network false
set -g @dracula-show-weather false
set -g @dracula-show-battery false
set -g @dracula-show-fahrenheit false

# 현재 경로 표시 (윈도우 포맷)
set -g @dracula-show-flags true
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W:#(echo '#{pane_current_path}' | sed 's|.*/||') "

run '~/.tmux/plugins/tpm/tpm'
